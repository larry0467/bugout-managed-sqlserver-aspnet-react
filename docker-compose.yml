version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD:-BugsManaged2026!}"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -Q "SELECT 1" -C -N || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./BugsManaged.Api
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      ConnectionStrings__DefaultConnection: "Server=db;Database=bugs_managed;User Id=sa;Password=${DB_PASSWORD:-BugsManaged2026!};TrustServerCertificate=True;"
      BugsManaged__Jwt__Secret: "${JWT_SECRET:-BugsManaged2026SecretKeyMustBeAtLeast256BitsLong!}"
      BugsManaged__Jwt__ExpirationMs: "86400000"
      BugsManaged__VideoStoragePath: "/app/videos"
      BugsManaged__Cors__AllowedOrigins: "${CORS_ORIGINS:-http://localhost,http://localhost:80}"
    volumes:
      - videos:/app/videos
    depends_on:
      db:
        condition: service_healthy

  admin:
    build:
      context: ./bugs-managed-admin
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  sqldata:
  videos:
